<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .window {
      width: 100%;
      max-width: 600px;
      background: #0a0a0a;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .title {
      font-size: 48px;
      font-weight: 300;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    
    .button-group {
      display: flex;
      gap: 16px;
      flex-direction: column;
    }
    
    button {
      padding: 16px 32px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-main {
      background: #ffffff;
      color: #000000;
    }
    
    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.2);
    }
    
    .btn-genuine {
      background: transparent;
      color: #888888;
      border: 1px solid #333333;
    }
    
    .btn-genuine:hover {
      color: #ffffff;
      border-color: #666666;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
    }
    
    .status-message {
      margin-top: 30px;
      font-size: 14px;
      color: #666666;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title">Welcome</div>
    <div class="button-group">
      <button class="btn-main" id="mainBtn">Enter</button>
      <button class="btn-genuine" id="genuineBtn">Genuine</button>
    </div>
    <div class="status-message" id="statusMsg"></div>
  </div>

  <script>
    document.getElementById('mainBtn').addEventListener('click', function() {
      fetch('/api/main', { method: 'POST' }).catch(() => {});
    });

    document.getElementById('genuineBtn').addEventListener('click', function() {
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.textContent = 'Coming Soon';
      statusMsg.style.color = '#888888';
      
      fetch('/api/genuine', { 
        method: 'POST',
        body: JSON.stringify({ rq: 'genuine_access' }),
        headers: { 'Content-Type': 'application/json' }
      }).catch(() => {});
    });
  </script>
</body>
</html>
